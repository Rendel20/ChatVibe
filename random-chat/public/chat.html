<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chat — ChatVibe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body class="bg-light chat-page">
    <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">
      <span class="theme-icon theme-icon-sun" aria-hidden="true">☀</span>
      <span class="theme-icon theme-icon-moon" aria-hidden="true">☽</span>
    </button>

    <header class="chat-header">
      <div class="chat-header-inner">
        <a href="/" class="chat-logo">
          <span class="chat-logo-icon">◆</span>
          <span class="chat-logo-text">ChatVibe</span>
        </a>
        <div id="status-pill" class="status-pill status-waiting">
          <span class="status-dot"></span>
          <span id="status-badge">Waiting</span>
        </div>
      </div>
    </header>

    <main class="chat-main">
      <div class="chat-window">
        <div
          id="messages"
          class="chat-messages"
          aria-live="polite"
          role="log"
        >
          <!-- Messages injected by client.js -->
        </div>
        <div class="chat-footer">
          <form id="chat-form" class="chat-form">
            <input
              id="message-input"
              type="text"
              class="chat-input"
              placeholder="Type a message..."
              autocomplete="off"
              aria-label="Message"
            />
            <div class="chat-actions">
              <button id="send-btn" class="btn btn-send" type="submit" disabled>
                Send
              </button>
              <button id="skip-btn" class="btn btn-skip" type="button">
                Skip
              </button>
              <button id="report-btn" class="btn btn-report" type="button">
                Report
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="/socket.io/socket.io.js"></script>
    <script>
      const themeToggle = document.getElementById('theme-toggle');

      function applyTheme(mode) {
        document.body.classList.toggle('dark-mode', mode === 'dark');
        themeToggle.setAttribute('aria-label', mode === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
      }

      (function initTheme() {
        const stored = localStorage.getItem('theme');
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        const initial = stored || (prefersDark ? 'dark' : 'light');
        applyTheme(initial);
      })();

      themeToggle.addEventListener('click', () => {
        const next = document.body.classList.contains('dark-mode') ? 'light' : 'dark';
        applyTheme(next);
        localStorage.setItem('theme', next);
      });
    </script>
    <script src="/client.js"></script>
  </body>
</html>
