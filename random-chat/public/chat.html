<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chat - Anonymous Random Chat</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body class="bg-light">
    <button id="theme-toggle" class="btn btn-sm btn-outline-secondary dark-toggle" type="button">
      Dark
    </button>
    <div class="container py-3 py-md-4">
      <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="h4 mb-0">ChatVibe</h1>
            <span id="status-badge" class="badge bg-secondary">Waiting</span>
          </div>

          <div class="card shadow-sm chat-card">
            <div
              id="messages"
              class="card-body messages-area overflow-auto"
              aria-live="polite"
            >
              <!-- Messages will be injected here -->
            </div>
            <div class="card-footer bg-white">
              <form id="chat-form" class="d-flex gap-2">
                <input
                  id="message-input"
                  type="text"
                  class="form-control"
                  placeholder="Type a message..."
                  autocomplete="off"
                />
                <button id="send-btn" class="btn btn-primary" type="submit">
                  Send
                </button>
                <button
                  id="skip-btn"
                  class="btn btn-outline-secondary"
                  type="button"
                >
                  Skip
                </button>
                <button
                  id="report-btn"
                  class="btn btn-outline-danger"
                  type="button"
                >
                  Report
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="/socket.io/socket.io.js"></script>
    <script>
      const themeToggle = document.getElementById('theme-toggle');

      function applyTheme(mode) {
        if (mode === 'dark') {
          document.body.classList.add('dark-mode');
          themeToggle.textContent = 'Light';
        } else {
          document.body.classList.remove('dark-mode');
          themeToggle.textContent = 'Dark';
        }
      }

      (function initTheme() {
        const stored = localStorage.getItem('theme');
        const prefersDark = window.matchMedia &&
          window.matchMedia('(prefers-color-scheme: dark)').matches;
        const initial = stored || (prefersDark ? 'dark' : 'light');
        applyTheme(initial);
      })();

      themeToggle.addEventListener('click', () => {
        const next = document.body.classList.contains('dark-mode')
          ? 'light'
          : 'dark';
        applyTheme(next);
        localStorage.setItem('theme', next);
      });
    </script>
    <script src="/client.js"></script>
  </body>
  </html>
